<div class="login-wrapper">
  <div class="login-card" style="max-width: 450px;">
    <h2>Bảo Mật Tài Khoản</h2>
    <p class="subtitle">Vui lòng nhập mã OTP gửi tới <b>{{ userEmail }}</b> và thiết lập mật khẩu mới</p>

    <div *ngIf="errorMessage" class="error-msg">{{ errorMessage }}</div>

    <form [formGroup]="passwordForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Mã xác thực (OTP)</label>
        <input type="text" formControlName="otp_code" placeholder="Nhập mã 6 số">
      </div>

      <div class="form-group">
        <label>Mật khẩu mới</label>
        <input type="password" formControlName="new_password" placeholder="Tối thiểu 6 ký tự, có số và chữ cái">
      </div>

      <div class="form-group">
        <label>Nhập lại mật khẩu</label>
        <input type="password" formControlName="confirm_password" placeholder="Nhập lại mật khẩu ở trên">
        <small style="color: #e74c3c; margin-top: 5px; display: block;" *ngIf="passwordForm.errors?.['mismatch'] && passwordForm.get('confirm_password')?.touched">
          Mật khẩu nhập lại không khớp!
        </small>
      </div>

      <button type="submit" class="btn-login" [disabled]="passwordForm.invalid || isLoading">
        {{ isLoading ? 'Đang xử lý...' : 'Xác nhận & Đổi mật khẩu' }}
      </button>
    </form>
  </div>
</div>
