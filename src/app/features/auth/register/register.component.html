<div class="login-wrapper">
  <div class="login-card" style="max-width: 450px;">
    <h2>Đăng Ký Chủ Trọ</h2>
    <p class="subtitle">Bắt đầu quản lý hệ thống nhà trọ của bạn</p>

    <div *ngIf="errorMessage" class="error-msg">{{ errorMessage }}</div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      
      <div class="form-group">
        <label>Họ và Tên</label>
        <input type="text" formControlName="full_name" placeholder="VD: Nguyễn Văn A">
      </div>

      <div class="form-group">
        <label>Email (Dùng để đăng nhập)</label>
        <input type="email" formControlName="email" placeholder="Nhập địa chỉ email thật để nhận OTP">
      </div>

      <div class="form-group">
        <label>Mật khẩu</label>
        <input type="password" formControlName="password" placeholder="Tối thiểu 6 ký tự">
      </div>

      <div class="form-group">
        <label>Nhập lại mật khẩu</label>
        <input type="password" formControlName="confirm_password" placeholder="Nhập lại mật khẩu ở trên">
        <small style="color: #e74c3c; margin-top: 5px; display: block;" *ngIf="registerForm.errors?.['mismatch'] && registerForm.get('confirm_password')?.touched">
          Mật khẩu nhập lại không khớp!
        </small>
      </div>

      <button type="submit" class="btn-login" [disabled]="registerForm.invalid || isLoading">
        {{ isLoading ? 'Đang gửi mã OTP...' : 'Đăng Ký Ngay' }}
      </button>
    </form>

    <div class="auth-links">
      <p>Đã có tài khoản? <a href="/login">Đăng nhập</a></p>
    </div>
  </div>
</div>
