<div class="login-wrapper">
  <div class="login-card wide-card">
    <h2>Đăng Ký Chủ Trọ</h2>
    <p class="subtitle">Đăng ký để đầu hệ thống quản lý nhà trọ của bạn</p>

    <div *ngIf="errorMessage" class="error-msg">{{ errorMessage }}</div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      
      <div class="form-group">
        <label>Họ và Tên</label>
        <input type="text" formControlName="full_name" placeholder="VD: Nguyễn Văn A" class="input">
      </div>

      <div class="form-group">
        <label>Email (Dùng để đăng nhập)</label>
        <input type="email" formControlName="email" placeholder="Nhập địa chỉ email để nhận OTP" class="input">
      </div>

      <div class="form-group">
        <label>Mật khẩu</label>
        <input type="password" formControlName="password" placeholder="Tối thiểu 8 ký tự, bao gồm chữ hoa, ký tự đặc biệt và số" class="input">
      </div>

      <div class="form-group">
        <label>Nhập lại mật khẩu</label>
        <input type="password" formControlName="confirm_password" placeholder="Nhập lại mật khẩu ở trên" class="input">
        <small class="validation-error" *ngIf="registerForm.errors?.['mismatch'] && registerForm.get('confirm_password')?.touched">
          Mật khẩu nhập lại không khớp!
        </small>
      </div>

      <button type="submit" class="btn-login" [disabled]="registerForm.invalid || isLoading">
        {{ isLoading ? 'Đang gửi mã OTP...' : 'Đăng Ký Ngay' }}
      </button>
    </form>

    <div class="auth-links">
      <p>Đã có tài khoản? <a href="/login">Đăng nhập</a></p>
    </div>
  </div>
</div>
