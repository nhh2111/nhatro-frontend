<div class="login-wrapper">
  <div class="login-card">
    <h2>Hệ Thống Quản Lý Trọ</h2>
    <p class="subtitle">Vui lòng đăng nhập để tiếp tục</p>

    <div *ngIf="errorMessage" class="error-msg">{{ errorMessage }}</div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Email đăng nhập</label>
        <input type="email" formControlName="email" placeholder="Nhập email của bạn" class="input">
      </div>

      <div class="form-group">
        <label>Mật khẩu</label>
        <input type="password" formControlName="password" placeholder="Nhập mật khẩu" class="input">
      </div>

      <button type="submit" class="btn-login" [disabled]="loginForm.invalid || isLoading">
        {{ isLoading ? 'Đang xử lý...' : 'Đăng Nhập' }}
      </button>
    </form>

    <div class="auth-links">
      <p><a href="/forgot-password">Quên mật khẩu?</a></p>
      <p>Chưa có tài khoản ? <a href="/register">Đăng ký ngay</a></p>
    </div>
  </div>
</div>
