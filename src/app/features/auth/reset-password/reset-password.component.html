<div class="login-wrapper">
  <div class="login-card wide-card">
    <h2>Đặt lại mật khẩu</h2>
    <p class="subtitle">Nhập mã OTP vừa được gửi đến email <b>{{ email }}</b> và thiết lập mật khẩu mới.</p>

    <div *ngIf="errorMessage" class="error-msg">{{ errorMessage }}</div>

    <form [formGroup]="resetForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Mã xác thực (OTP)</label>
        <!-- Thêm class otp-input cho đẹp -->
        <input type="text" formControlName="otp_code" placeholder="Nhập mã 6 số" maxlength="6" class="input otp-input">
      </div>

      <div class="form-group">
        <label>Mật khẩu mới</label>
        <input type="password" formControlName="new_password" placeholder="Tối thiểu 6 ký tự" class="input">
      </div>

      <div class="form-group">
        <label>Xác nhận mật khẩu</label>
        <input type="password" formControlName="confirm_password" placeholder="Nhập lại mật khẩu mới" class="input">
        <small class="validation-error" *ngIf="resetForm.errors?.['mismatch'] && resetForm.get('confirm_password')?.touched">
          Mật khẩu nhập lại không khớp!
        </small>
      </div>

      <button type="submit" class="btn-login" [disabled]="resetForm.invalid || isLoading">
        {{ isLoading ? 'Đang xử lý...' : 'Xác nhận đổi mật khẩu' }}
      </button>
    </form>

    <div class="auth-links">
      <!-- Đã đổi từ routerLink thành href để dễ click -->
      <p><a href="/login">← Quay lại Đăng nhập</a></p>
    </div>
  </div>
</div>
