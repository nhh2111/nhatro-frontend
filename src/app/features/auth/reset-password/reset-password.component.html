<div class="login-wrapper">
  <div class="login-card">
    <h2>Đặt lại mật khẩu</h2>
    <p class="subtitle">Nhập mã OTP vừa được gửi đến email <b>{{ email }}</b> và thiết lập mật khẩu mới.</p>

    <div *ngIf="errorMessage" class="error-msg">{{ errorMessage }}</div>

    <form [formGroup]="resetForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Mã xác thực (OTP)</label>
        <input type="text" formControlName="otp_code" placeholder="Nhập mã 6 số" maxlength="6" style="text-align: center; font-size: 20px; letter-spacing: 5px; font-weight: bold;">
      </div>

      <div class="form-group">
        <label>Mật khẩu mới</label>
        <input type="password" formControlName="new_password" placeholder="Tối thiểu 6 ký tự">
      </div>

      <div class="form-group">
        <label>Xác nhận mật khẩu</label>
        <input type="password" formControlName="confirm_password" placeholder="Nhập lại mật khẩu mới">
        <small style="color: #e74c3c; margin-top: 5px; display: block;" *ngIf="resetForm.errors?.['mismatch'] && resetForm.get('confirm_password')?.touched">
          Mật khẩu nhập lại không khớp!
        </small>
      </div>

      <button type="submit" class="btn-login" [disabled]="resetForm.invalid || isLoading">
        {{ isLoading ? 'Đang xử lý...' : 'Xác nhận đổi mật khẩu' }}
      </button>
    </form>

    <div class="auth-links">
      <p><a routerLink="/login">← Quay lại Đăng nhập</a></p>
    </div>
  </div>
</div>
