<div class="login-wrapper">
  <div class="login-card">
    <h2>Khôi phục mật khẩu</h2>
    <p class="subtitle">Nhập email của bạn để nhận mã xác thực (OTP)</p>

    <div *ngIf="errorMessage" class="error-msg">{{ errorMessage }}</div>
    
    <div *ngIf="successMessage" class="success-msg">
      {{ successMessage }}
    </div>

    <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Email đăng nhập</label>
        <input type="email" formControlName="email" placeholder="Nhập email tài khoản của bạn" class="input">
      </div>

      <button type="submit" class="btn-login" [disabled]="forgotForm.invalid || isLoading">
        {{ isLoading ? 'Đang gửi mã...' : 'Gửi mã xác thực' }}
      </button>
    </form>

    <div class="auth-links">
      <p><a routerLink="/login">← Quay lại Đăng nhập</a></p>
    </div>
  </div>
</div>
