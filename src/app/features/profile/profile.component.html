<div class="page-container">
  <div class="page-header">
    <h2>Thông tin cá nhân</h2>
  </div>

  <div class="profile-card">
    <div class="profile-avatar-section">
      <img [src]="profileForm.get('avatar')?.value || defaultAvatar" alt="Avatar" class="avatar-img-large">
      <h3>{{ profileForm.get('full_name')?.value || 'Đang tải...' }}</h3>
      <p>Chức vụ: <strong>{{ profileForm.get('role')?.value === 'OWNER' ? 'Chủ trọ' : 'Nhân viên' }}</strong></p>
    </div>

    <form [formGroup]="profileForm" (ngSubmit)="saveProfile()">
      <div class="form-grid">
        <div class="form-group full-width">
          <label>Họ và tên (*)</label>
          <input type="text" formControlName="full_name">
        </div>

        <div class="form-group">
          <label>Số điện thoại</label>
          <input type="text" formControlName="phone">
        </div>

        <div class="form-group">
          <label>Số CCCD / CMND</label>
          <input type="text" formControlName="cccd">
        </div>

        <div class="form-group full-width">
          <label>Link Ảnh Đại Diện (Tùy chọn)</label>
          <input type="text" formControlName="avatar" placeholder="Dán link ảnh (Google Drive/Imgur...) vào đây">
        </div>

        <div class="form-group">
          <label>Email đăng nhập</label>
          <input type="email" formControlName="email" readonly>
        </div>

        <div class="form-group">
          <label>Quyền hạn hệ thống</label>
          <input type="text" formControlName="role" readonly>
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-save" [disabled]="profileForm.invalid || isLoading">
          {{ isLoading ? 'Đang lưu...' : 'Cập nhật thông tin' }}
        </button>
      </div>
    </form>
  </div>
</div>
