<div class="page-container">
  <div class="page-header">
    <h2>Thông tin cá nhân</h2>
  </div>

  <div class="profile-card" style="margin-bottom: 20px;">
    <div class="profile-avatar-section">
      <div class="avatar-wrapper">
        <img [src]="previewAvatar || profileForm.get('avatar')?.value || defaultAvatar" alt="Avatar" class="avatar-img-large">
        <div class="upload-btn-wrapper">
          <button type="button" class="btn-upload">📷 Tải ảnh</button>
          <input type="file" (change)="onFileSelected($event)" accept="image/*" />
        </div>
      </div>
      <h3>{{ profileForm.get('full_name')?.value || 'Đang tải...' }}</h3>
      <p>Chức vụ: <span class="badge badge-info">{{ profileForm.get('role')?.value === 'OWNER' ? 'Chủ trọ' : 'Nhân viên' }}</span></p>
    </div>

    <form [formGroup]="profileForm" (ngSubmit)="saveProfile()">
      <div class="form-grid">
        <div class="form-group full-width">
          <label>Họ và tên (*)</label>
          <input type="text" formControlName="full_name">
        </div>
        <div class="form-group">
          <label>Số điện thoại</label>
          <input type="text" formControlName="phone">
        </div>
        <div class="form-group">
          <label>Số CCCD / CMND</label>
          <input type="text" formControlName="cccd">
        </div>
        <div class="form-group">
          <label>Email đăng nhập</label>
          <input type="email" formControlName="email" readonly style="background-color: #f8f9fa; cursor: not-allowed;">
        </div>
        <div class="form-group">
          <label>Quyền hạn hệ thống</label>
          <input type="text" formControlName="role" readonly style="background-color: #f8f9fa; cursor: not-allowed;">
        </div>
      </div>

      <div class="form-actions" style="display: flex; gap: 15px; justify-content: center;">
        <button type="submit" class="btn-save" [disabled]="profileForm.invalid || isLoading">
          {{ isLoading ? 'Đang lưu...' : 'Cập nhật thông tin' }}
        </button>
        <button type="button" class="btn-warning" (click)="openPasswordModal()">
          🔒 Đổi mật khẩu
        </button>
      </div>
    </form>
  </div>
</div>

<div class="modal-overlay" *ngIf="showPasswordModal">
  <div class="modal-content" style="max-width: 500px;">
    <div class="modal-header">
      <div>
        <h3 style="margin: 0; color: #2c3e50;">Đổi Mật Khẩu</h3>
        <p style="margin: 5px 0 0 0; color: #7f8c8d; font-size: 13px;">Bảo mật tài khoản bằng mật khẩu mạnh</p>
      </div>
      <button class="btn-close" (click)="closePasswordModal()">×</button>
    </div>

    <form [formGroup]="passwordForm" (ngSubmit)="changePassword()">
      <div class="form-grid" style="grid-template-columns: 1fr; padding-bottom: 0;">
        <div class="form-group">
          <label>Mật khẩu hiện tại (*)</label>
          <input type="password" formControlName="old_password" placeholder="Nhập mật khẩu đang dùng">
        </div>
        <div class="form-group">
          <label>Mật khẩu mới (*)</label>
          <input type="password" formControlName="new_password" placeholder="Tối thiểu 8 ký tự (chữ hoa, chữ thường, số)">
        </div>
        <div class="form-group">
          <label>Xác nhận mật khẩu mới (*)</label>
          <input type="password" formControlName="confirm_password" placeholder="Nhập lại mật khẩu mới">
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn-cancel" (click)="closePasswordModal()">Hủy</button>
        <button type="submit" class="btn-save" style="background-color: var(--warning);" [disabled]="passwordForm.invalid || isChangingPassword">
          {{ isChangingPassword ? 'Đang xử lý...' : 'Xác nhận đổi' }}
        </button>
      </div>
    </form>
  </div>
</div>
